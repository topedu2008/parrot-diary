<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=web/">
  <title>鹦鹉成长日记 - 跳转中...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .loading {
      text-align: center;
    }
    .loading h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .loading p {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .link {
      display: inline-block;
      margin-top: 1rem;
      padding: 12px 24px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 24px;
      font-weight: 600;
      transition: transform 0.3s;
    }
    .link:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="loading">
    <h1>🦜 鹦鹉成长日记</h1>
    <p>正在跳转到网站...</p>
    <div class="spinner"></div>
    <p style="font-size: 14px; opacity: 0.7;">如果页面没有自动跳转</p>
    <a href="web/" class="link">点击这里访问</a>
  </div>
  <script>
    // 3 秒后自动跳转
    setTimeout(function() {
      window.location.href = 'web/';
    }, 3000);
  </script>
</body>
</html>
